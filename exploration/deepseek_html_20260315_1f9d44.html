<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LaundryLog · event modeling (light themes)</title>
    <!-- Font Awesome 6 (free) for icons & touch-friendly controls -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- RESET & BASE (light mode first) ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s, color 0.2s;
        }

        /* light theme variables (default) */
        body {
            --bg-body: #f4f7fb;
            --bg-card: #ffffff;
            --border-light: #e9edf2;
            --text-primary: #1a2634;
            --text-secondary: #4a5a6e;
            --accent-primary: #2b6f9c;
            --accent-soft: #e1ecf5;
            --badge-bg: #f0f3f7;
            --shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,20,40,0.05);
            --hover-bg: #f9fcff;
            --gwt-bg: #f8fafd;
            --code-bg: #edf2f7;
        }

        /* warm light theme */
        body.theme-warm {
            --bg-body: #fef7f0;
            --bg-card: #fffaf5;
            --border-light: #f0e5da;
            --text-primary: #342a1f;
            --text-secondary: #685e54;
            --accent-primary: #b16e4b;
            --accent-soft: #ffefe4;
            --badge-bg: #f5ede5;
            --shadow: 0 8px 20px rgba(100, 50, 10, 0.03);
            --hover-bg: #fff4ea;
            --gwt-bg: #fdf3ea;
            --code-bg: #f7e9de;
        }

        /* cool light theme */
        body.theme-cool {
            --bg-body: #eff9f5;
            --bg-card: #ffffff;
            --border-light: #d9eee5;
            --text-primary: #1c3d35;
            --text-secondary: #3f5f56;
            --accent-primary: #2c7a6e;
            --accent-soft: #d9f0ea;
            --badge-bg: #e2f0eb;
            --shadow: 0 8px 20px rgba(20, 80, 60, 0.03);
            --hover-bg: #f3fdf9;
            --gwt-bg: #edf9f4;
            --code-bg: #e0f0e9;
        }

        /* ----- LAYOUT ----- */
        .theme-panel {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .theme-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .theme-btn i {
            color: var(--accent-primary);
            font-size: 1rem;
        }

        .theme-btn.active {
            border-color: var(--accent-primary);
            background: var(--accent-soft);
            color: var(--accent-primary);
        }

        .columns-container {
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            overflow-x: auto;
            padding: 0.5rem 0.25rem 1.5rem 0.25rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-primary) var(--border-light);
            -webkit-overflow-scrolling: touch;
        }

        .columns-container::-webkit-scrollbar {
            height: 8px;
        }
        .columns-container::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 20px;
        }
        .columns-container::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 20px;
        }

        /* ----- SLICE COLUMN CARD ----- */
        .slice-column {
            flex: 0 0 320px;
            background: var(--bg-card);
            border-radius: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            padding: 1.5rem 1.2rem 1.5rem 1.2rem;
            transition: background 0.2s, border 0.2s;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            touch-action: pan-y pinch-zoom; /* preserve scroll */
        }

        /* header always visible */
        .col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }
        .title-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .slice-name {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        .slice-type {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--accent-primary);
            background: var(--accent-soft);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            width: fit-content;
            border: 1px solid var(--border-light);
        }
        .collapse-btn {
            background: var(--badge-bg);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.1s;
            touch-action: manipulation;
        }
        .collapse-btn:hover {
            background: var(--hover-bg);
            color: var(--accent-primary);
        }

        /* origin image / snapshot placeholder */
        .origin-snapshot {
            background: var(--accent-soft);
            border: 1px dashed var(--border-light);
            border-radius: 22px;
            height: 120px;
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            gap: 8px;
            transition: background 0.2s;
            background-image: radial-gradient(circle at 20px 20px, var(--border-light) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .origin-snapshot i {
            font-size: 2.2rem;
            opacity: 0.7;
            color: var(--accent-primary);
        }
        .snapshot-label {
            background: var(--bg-card);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* collapsible details section */
        .details-section {
            transition: opacity 0.2s, margin 0.2s;
            margin-bottom: 1rem;
        }
        .details-section.collapsed {
            display: none;
        }

        /* info blocks */
        .info-block {
            margin-bottom: 1.2rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 0.8rem;
        }
        .block-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .block-title i {
            color: var(--accent-primary);
            font-size: 0.9rem;
        }
        .field-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .field-tag {
            background: var(--badge-bg);
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .event-row {
            background: var(--code-bg);
            border-radius: 16px;
            padding: 0.8rem;
            font-size: 0.8rem;
            border-left: 4px solid var(--accent-primary);
        }
        .event-name {
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 4px;
        }
        .handler-name {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 0.4rem 1rem;
            border: 1px solid var(--border-light);
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* GWT toggle button (always visible, touch friendly) */
        .gwt-toggle-btn {
            width: 100%;
            background: var(--badge-bg);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 0.9rem 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0.5rem 0 0.8rem 0;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .gwt-toggle-btn i {
            font-size: 1.1rem;
        }
        .gwt-toggle-btn:hover {
            background: var(--hover-bg);
            border-color: var(--accent-primary);
        }

        /* GWT block (hidden by default) */
        .gwt-block {
            background: var(--gwt-bg);
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid var(--border-light);
            transition: 0.2s;
            margin-top: 0.2rem;
        }
        .gwt-block.hidden {
            display: none;
        }
        .gwt-item {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--border-light);
            font-size: 0.85rem;
        }
        .gwt-item:last-child {
            margin-bottom: 0;
        }
        .gwt-given, .gwt-when, .gwt-then {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 6px;
        }
        .gwt-label {
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 55px;
            text-transform: uppercase;
            font-size: 0.7rem;
        }
        .gwt-value {
            color: var(--text-primary);
            font-family: 'SF Mono', monospace;
            background: var(--code-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
        }
        .gwt-desc {
            margin-top: 8px;
            font-style: italic;
            color: var(--text-secondary);
            border-top: 1px dashed var(--border-light);
            padding-top: 6px;
        }

        .small-note {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: right;
        }

        /* touch adjustments */
        button {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .fa-chevron-down, .fa-chevron-up {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- theme switcher (light mode styles) -->
    <div class="theme-panel">
        <button class="theme-btn active" data-theme="default"><i class="fas fa-sun"></i> Default light</button>
        <button class="theme-btn" data-theme="warm"><i class="fas fa-mug-hot"></i> Warm light</button>
        <button class="theme-btn" data-theme="cool"><i class="fas fa-snowflake"></i> Cool light</button>
    </div>

    <!-- columns container (event modeling slices) -->
    <div class="columns-container" id="columnsContainer"></div>

    <script>
        (function() {
            // ---------- SLICE DATA (from provided .toml files) ----------
            const slices = [
                {
                    id: "019644a1-b1a0-7000-8000-000000000100",
                    name: "OpenApp",
                    type: "CommandSlice",
                    description: "Truck driver opens the LaundryLog app",
                    origin: { name: "Splash Screen", snapshot: "app-splash-screen.png", facets: ["business.emd"] },
                    command: { name: "OpenApp", fields: [] },
                    handler: "OpenAppHandler",
                    events: [{ name: "AppOpened", fields: [{ name: "openedAt", type: "datetime" }] }],
                    gwt: [{
                        name: "OpenApp",
                        given: "Unit",
                        when: "OpenApp",
                        then: "AppOpened",
                        description: "No prior state needed. App opened."
                    }]
                },
                {
                    id: "019644a1-b1a0-7000-8000-000000000300",
                    name: "SetLocation",
                    type: "CommandSlice",
                    description: "Truck driver provides the laundromat location",
                    origin: { name: "Get Location Screen", snapshot: "get-location-screen.png", facets: ["business.emd"] },
                    command: { name: "SetLocation", fields: [{ name: "location", type: "string" }] },
                    handler: "SetLocationHandler",
                    events: [{ name: "LocationSet", fields: [{ name: "location", type: "string" }] }],
                    gwt: [{
                        name: "SetLocation",
                        given: ["AppOpened"],
                        when: "SetLocation",
                        then: "LocationSet",
                        description: "App has been opened, driver provides location."
                    }]
                },
                {
                    id: "019644a1-b1a0-7000-8000-000000000400",
                    name: "CurrentLocation",
                    type: "ViewSlice",
                    description: "Provides the current laundromat location for expense entry",
                    origin: { name: "NoScreen", snapshot: null, facets: ["business"] },
                    view: { name: "CurrentLocation", fields: [{ name: "location", type: "string" }] },
                    projector: "CurrentLocationProjector",
                    events: [],  // no event directly; view projection based on LocationSet
                    gwt: [{
                        name: "LocationAvailable",
                        given: ["LocationSet"],
                        then: "CurrentLocation",
                        description: "Location has been set, provide it for expense entry."
                    }]
                },
                {
                    id: "019644a1-b1a0-7000-8000-000000000500",
                    name: "LogExpense",
                    type: "CommandSlice",
                    description: "Truck driver logs a laundry expense",
                    origin: { name: "Expense Entry Screen", snapshot: "expense-entry-screen.png", facets: ["business.emd"] },
                    command: { name: "LogExpense", fields: [
                        { name: "machineType", type: "string" },
                        { name: "quantity", type: "int" },
                        { name: "pricePerMachine", type: "decimal" },
                        { name: "paymentMethod", type: "string" },
                        { name: "location", type: "string" }
                    ]},
                    handler: "LogExpenseHandler",
                    events: [{ name: "LaundryExpenseLogged", fields: [
                        { name: "expenseId", type: "guid" },
                        { name: "machineType", type: "string" },
                        { name: "quantity", type: "int" },
                        { name: "pricePerMachine", type: "decimal" },
                        { name: "totalCost", type: "decimal" },
                        { name: "paymentMethod", type: "string" },
                        { name: "location", type: "string" },
                        { name: "loggedAt", type: "datetime" }
                    ]}],
                    gwt: [{
                        name: "LogNewExpense",
                        given: ["LocationSet"],
                        when: "LogExpense",
                        then: "LaundryExpenseLogged",
                        description: "Location must be established. Driver logs expense details."
                    }]
                },
                {
                    id: "019644a1-b1a0-7000-8000-000000000600",
                    name: "RecentExpenses",
                    type: "ViewSlice",
                    description: "Shows recently logged laundry expenses",
                    origin: { name: "NoScreen", snapshot: null, facets: ["business"] },
                    view: { name: "RecentExpenses", fields: [
                        { name: "expenses", type: "list" },
                        { name: "totalSpent", type: "decimal" },
                        { name: "expenseCount", type: "int" },
                        { name: "location", type: "string" }
                    ]},
                    projector: "RecentExpensesProjector",
                    events: [],
                    gwt: [{
                        name: "RecentExpensesWithinWindow",
                        given: ["LaundryExpenseLogged"],
                        when: "loggedAt within 3 hours",
                        then: "RecentExpenses",
                        description: "Shows all expenses logged within the last 3 hours."
                    }]
                }
            ];

            // Helper: format field list
            function renderFields(fields) {
                if (!fields || fields.length === 0) return '<span class="field-tag">(none)</span>';
                return fields.map(f => `<span class="field-tag">${f.name}: ${f.type}</span>`).join('');
            }

            // Render a slice column
            function renderSlice(slice) {
                const col = document.createElement('div');
                col.className = 'slice-column';
                col.dataset.id = slice.id;

                // ----- header with collapse button -----
                const header = document.createElement('div');
                header.className = 'col-header';
                header.innerHTML = `
                    <div class="title-group">
                        <span class="slice-name">${slice.name}</span>
                        <span class="slice-type">${slice.type}</span>
                    </div>
                    <button class="collapse-btn" aria-label="Toggle details"><i class="fas fa-chevron-down"></i></button>
                `;

                // ----- origin snapshot (image placeholder) -----
                const originDiv = document.createElement('div');
                originDiv.className = 'origin-snapshot';
                const snapshotName = slice.origin.snapshot ? slice.origin.snapshot : 'no screenshot';
                originDiv.innerHTML = `
                    <i class="fas fa-camera"></i>
                    <span class="snapshot-label">${slice.origin.name}</span>
                    <span style="font-size:0.7rem; opacity:0.7;">${snapshotName}</span>
                `;

                // ----- collapsible details section (command / view, events, handler) -----
                const detailsDiv = document.createElement('div');
                detailsDiv.className = 'details-section';

                // command or view block
                let cmdHtml = '';
                if (slice.command) {
                    cmdHtml = `
                        <div class="info-block">
                            <div class="block-title"><i class="fas fa-terminal"></i> COMMAND ${slice.command.name}</div>
                            <div class="field-list">${renderFields(slice.command.fields)}</div>
                        </div>
                    `;
                } else if (slice.view) {
                    cmdHtml = `
                        <div class="info-block">
                            <div class="block-title"><i class="fas fa-eye"></i> VIEW ${slice.view.name}</div>
                            <div class="field-list">${renderFields(slice.view.fields)}</div>
                        </div>
                    `;
                }

                // events block
                let eventsHtml = '';
                if (slice.events.length > 0) {
                    eventsHtml = slice.events.map(ev => `
                        <div class="info-block">
                            <div class="block-title"><i class="fas fa-bolt"></i> EVENT ${ev.name}</div>
                            <div class="event-row">
                                <div class="event-name">${ev.name}</div>
                                <div class="field-list">${renderFields(ev.fields)}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    eventsHtml = `<div class="info-block"><div class="block-title"><i class="fas fa-bolt"></i> PROJECTION</div><div class="handler-name">(projected from events)</div></div>`;
                }

                // handler / projector
                const handlerName = slice.handler || slice.projector || '—';
                const handlerIcon = slice.handler ? 'fa-gear' : 'fa-cubes';
                const handlerHtml = `
                    <div class="info-block">
                        <div class="block-title"><i class="fas ${handlerIcon}"></i> ${slice.handler ? 'HANDLER' : 'PROJECTOR'}</div>
                        <span class="handler-name">${handlerName}</span>
                    </div>
                `;

                detailsDiv.innerHTML = cmdHtml + eventsHtml + handlerHtml;

                // ----- GWT toggle button and block -----
                const gwtToggle = document.createElement('button');
                gwtToggle.className = 'gwt-toggle-btn';
                gwtToggle.innerHTML = '<i class="fas fa-gavel"></i> <span>Show GWT rules</span> <i class="fas fa-chevron-down" style="font-size:0.8rem;"></i>';

                const gwtBlock = document.createElement('div');
                gwtBlock.className = 'gwt-block hidden';

                if (slice.gwt && slice.gwt.length > 0) {
                    slice.gwt.forEach(g => {
                        const givenVal = Array.isArray(g.given) ? g.given.join(', ') : g.given;
                        const whenVal = g.when || '—';
                        const thenVal = g.then;
                        const item = document.createElement('div');
                        item.className = 'gwt-item';
                        item.innerHTML = `
                            <div class="gwt-given"><span class="gwt-label">GIVEN</span><span class="gwt-value">${givenVal}</span></div>
                            ${whenVal !== '—' ? `<div class="gwt-when"><span class="gwt-label">WHEN</span><span class="gwt-value">${whenVal}</span></div>` : ''}
                            <div class="gwt-then"><span class="gwt-label">THEN</span><span class="gwt-value">${thenVal}</span></div>
                            <div class="gwt-desc">${g.description || ''}</div>
                        `;
                        gwtBlock.appendChild(item);
                    });
                } else {
                    gwtBlock.innerHTML = '<div class="gwt-item">(no GWT rules defined)</div>';
                }

                // assemble column
                col.appendChild(header);
                col.appendChild(originDiv);
                col.appendChild(detailsDiv);
                col.appendChild(gwtToggle);
                col.appendChild(gwtBlock);

                // ----- attach event listeners for this column -----
                const collapseBtn = header.querySelector('.collapse-btn');
                const details = detailsDiv;
                const toggleBtn = gwtToggle;
                const gwtDiv = gwtBlock;
                let detailsVisible = true;
                let gwtVisible = false;

                collapseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    detailsVisible = !detailsVisible;
                    if (detailsVisible) {
                        details.classList.remove('collapsed');
                        collapseBtn.innerHTML = '<i class="fas fa-chevron-down"></i>';
                    } else {
                        details.classList.add('collapsed');
                        collapseBtn.innerHTML = '<i class="fas fa-chevron-up"></i>';
                    }
                });

                toggleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    gwtVisible = !gwtVisible;
                    if (gwtVisible) {
                        gwtDiv.classList.remove('hidden');
                        toggleBtn.innerHTML = '<i class="fas fa-gavel"></i> <span>Hide GWT rules</span> <i class="fas fa-chevron-up" style="font-size:0.8rem;"></i>';
                    } else {
                        gwtDiv.classList.add('hidden');
                        toggleBtn.innerHTML = '<i class="fas fa-gavel"></i> <span>Show GWT rules</span> <i class="fas fa-chevron-down" style="font-size:0.8rem;"></i>';
                    }
                });

                return col;
            }

            // render all columns into container
            const container = document.getElementById('columnsContainer');
            slices.forEach(s => container.appendChild(renderSlice(s)));

            // ----- THEME SWITCHER (light mode variations) -----
            const themeBtns = document.querySelectorAll('.theme-btn');
            themeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    document.body.className = ''; // reset
                    if (theme === 'warm') document.body.classList.add('theme-warm');
                    else if (theme === 'cool') document.body.classList.add('theme-cool');
                    else document.body.classList.add('theme-default'); // default

                    themeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });

            // ensure default theme active
            document.body.classList.add('theme-default');
        })();
    </script>
    <!-- tiny footer note (optional) -->
    <div style="margin-top: 2rem; text-align: center; font-size: 0.8rem; color: var(--text-secondary);">
        <i class="fas fa-mobile-alt"></i> touch-friendly · toggle GWT · expand/collapse details
    </div>
</body>
</html>
