<!DOCTYPE html>
<html id="slice-root" lang="en">
<head id="slice-head">
    <meta id="slice-meta" charset="UTF-8">
    <title id="slice-page-title">Slice working file</title>
    <style id="slice-internal-style">
        :root {
            --slice-status-color: black;
            --slice-bg-color: #f0f9ff;
            --slice-header-bg-color: #e0f2fe;
            --slice-border-width: 4px;
            --slice-width: 2.5in;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 2rem;
            background-color: #f8fafc;
        }

        .slice-outer-container {
            position: relative;
            border: var(--slice-border-width) solid var(--slice-status-color);
            border-radius: 8px;
            background-color: var(--slice-bg-color);
            padding: 0.5rem;
            width: var(--slice-width);
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .slice-header-group {
            background-color: var(--slice-header-bg-color);
            margin: -0.5rem -0.5rem 1rem -0.5rem;
            border-bottom: 2px solid #bae6fd;
            border-left: 1px solid #bae6fd;
            border-right: 1px solid #bae6fd;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            padding-bottom: 0.5rem;
            height: 4.5rem;
            overflow: hidden;
        }

        .slice-header {
            padding: 1.5rem 0.5rem 0.25rem 0.5rem;
        }

        .slice-header-description {
            padding: 0 0.5rem;
            font-size: 0.75rem;
            color: #475569;
            text-transform: lowercase;
        }

        .slice-title {
            margin: 0;
            font-size: 1rem;
            color: black;
        }

        .slice-type {
            position: absolute;
            top: 0.25rem;
            right: 0.5rem;
            font-size: 0.7rem;
            color: #075985;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .slice-tag {
            position: absolute;
            top: 0.25rem;
            left: 0.5rem;
            font-size: 0.6rem;
            font-weight: 600;
            background-color: #ffb74d;
            color: #ffffff;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            letter-spacing: 0.025em;
            line-height: 1.2;
        }

        .slice-inset-box {
            background-color: white;
            border-radius: 8px;
            height: 8.75rem;
            margin: 0 0 1rem 0;
            border: 1px solid #bae6fd;
            box-sizing: border-box;
            position: relative;
        }

        .actor-screen-name {
            position: absolute;
            top: 0.25rem;
            left: 0.5rem;
            font-size: 0.65rem;
            color: #475569;
        }

        .actor-screen-type {
            position: absolute;
            top: 0.4rem;
            right: 0.5rem;
            font-size: 0.55rem;
            font-weight: bold;
            background-color: #cbd5e1;
            color: #1e293b;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .actor-badge-pill {
            position: absolute;
            top: 1.6rem;
            right: 0.5rem;
            font-size: 0.55rem;
            font-weight: 600;
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            border: 1px solid #bae6fd;
        }

        .actor-badge-code {
            position: absolute;
            top: 3rem;
            right: 0.5rem;
            font-size: 0.55rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background-color: #f1f5f9;
            color: #475569;
            padding: 0.1rem 0.3rem;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
        }

        .actor-image {
            position: absolute;
            top: 1.4rem;
            left: 0.5rem;
            max-height: calc(100% - 1.6rem);
            max-width: 95%;
            object-fit: contain;
        }
    </style>
</head>
<body id="slice-body">
    <div id="slice-container" class="slice-outer-container">
        <span id="slice-system-tag" class="slice-tag">LaundryLog</span>
        <span id="slice-label" class="slice-type">Command Slice</span>
        <div id="slice-header-container" class="slice-header-group">
            <header id="slice-header-section" class="slice-header">
                <h1 id="slice-main-title" class="slice-title">myCommand</h1>
            </header>
            <div id="slice-description-label" class="slice-header-description">description</div>
        </div>
        <div id="actor-row-box" class="slice-inset-box">
            <span id="actor-screen-label" class="actor-screen-name">Text Screen Name</span>
            <span id="actor-screen-badge" class="actor-screen-type">SCREEN</span>
            <span id="actor-type-badge" class="actor-badge-pill">TruckDriver</span>
            <span id="actor-domain-badge" class="actor-badge-code">business.emd</span>
            <img id="actor-screen-image" src="images/Screen.png" alt="Screen Snapshot" class="actor-image">
        </div>
        <div id="slice-body-content" class="slice-content">
            <p id="slice-description-1">This is the initial version of a Slice container.</p>
            <p id="slice-description-2">The border color indicates the current status (currently set to black).</p>
        </div>
    </div>
</body>
</html>
