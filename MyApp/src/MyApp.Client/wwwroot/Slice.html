<!DOCTYPE html>
<html id="slice-root" lang="en">
<head id="slice-head">
    <meta id="slice-meta" charset="UTF-8">
    <title id="slice-page-title">Slice working file</title>
    <style id="slice-internal-style">
        :root {
            --slice-status-color: black;
            --slice-bg-color: #f0f9ff;
            --slice-header-bg-color: #e0f2fe;
            --slice-border-width: 4px;
            --slice-width: 2.5in;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 2rem;
            background-color: #f8fafc;
        }

        .slice-outer-container {
            position: relative;
            border: var(--slice-border-width) solid var(--slice-status-color);
            border-radius: 8px;
            background-color: var(--slice-bg-color);
            padding: 0.5rem;
            width: var(--slice-width);
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .slice-header-group {
            background-color: var(--slice-header-bg-color);
            margin: -0.5rem -0.5rem 1rem -0.5rem;
            border-bottom: 2px solid #bae6fd;
            border-left: 1px solid #bae6fd;
            border-right: 1px solid #bae6fd;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            padding-bottom: 0.5rem;
            height: 4.5rem;
            overflow: hidden;
        }

        .slice-header {
            padding: 1.5rem 0.5rem 0.25rem 0.5rem;
        }

        .slice-header-description {
            padding: 0 0.5rem;
            font-size: 0.75rem;
            color: #475569;
            text-transform: lowercase;
        }

        .slice-title {
            margin: 0;
            font-size: 1rem;
            color: black;
        }

        .slice-type {
            position: absolute;
            top: 0.25rem;
            right: 0.5rem;
            font-size: 0.7rem;
            color: #075985;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .slice-tag {
            position: absolute;
            top: 0.25rem;
            left: 0.5rem;
            font-size: 0.6rem;
            font-weight: 600;
            background-color: #ffb74d;
            color: #ffffff;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            letter-spacing: 0.025em;
            line-height: 1.2;
        }

        .slice-inset-box {
            background-color: white;
            border-radius: 8px;
            height: 8.75rem;
            margin: 0 0 1rem 0;
            border: 1px solid #bae6fd;
            box-sizing: border-box;
            position: relative;
        }

        #command-row-box {
            background-color: #e0f2fe; /* Sky 100 */
            border-color: #7dd3fc; /* Sky 300 */
            height: auto;
            min-height: 8.75rem;
        }

        #event-row-box {
            background-color: #ffedd5; /* Orange 100 */
            border-color: #fdba74; /* Orange 300 */
            height: auto;
            min-height: 8.75rem;
        }

        .inset-box-label {
            position: absolute;
            top: 0.25rem;
            left: 0.5rem;
            font-size: 0.65rem;
            color: #475569;
        }

        .inset-box-badge-group {
            position: absolute;
            top: 0.4rem;
            right: 0.5rem;
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .inset-box-badge-type {
            font-size: 0.55rem;
            font-weight: bold;
            background-color: #cbd5e1;
            color: #1e293b;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .inset-box-badge-pill {
            font-size: 0.55rem;
            font-weight: 600;
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            border: 1px solid #bae6fd;
        }

        .inset-box-badge-code {
            position: absolute;
            bottom: 0.25rem;
            right: 0.5rem;
            font-size: 0.55rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background-color: #f1f5f9;
            color: #475569;
            padding: 0.1rem 0.3rem;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
        }

        .actor-screen-image {
            position: absolute;
            top: 2rem;
            left: 0.5rem;
            max-height: calc(100% - 3.5rem);
            max-width: 95%;
            object-fit: contain;
        }

        .inset-box-blue-rect {
            margin: 2rem 0.5rem 0 0.5rem;
            background-color: #0ea5e9; /* Sky 500 */
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 1px 1px 0 0;
            font-size: 0.85rem;
            font-weight: 500;
            min-height: 3rem;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        .inset-box-toml-rect {
            margin: 0 0.5rem 0.5rem 0.5rem;
            background-color: #bae6fd; /* Sky 200 */
            color: #0369a1; /* Sky 700 */
            padding: 0.4rem 0.8rem;
            border-radius: 0 0 1px 1px;
            font-size: 0.75rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            white-space: pre-wrap;
            min-height: 1.5rem;
            box-sizing: border-box;
        }

        .inset-box-orange-rect {
            margin: 2rem 0.5rem 0 0.5rem;
            background-color: #f97316; /* Orange 500 */
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 1px 1px 0 0;
            font-size: 0.85rem;
            font-weight: 500;
            min-height: 3rem;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        .inset-box-toml-rect-orange {
            margin: 0 0.5rem 0.5rem 0.5rem;
            background-color: #fed7aa; /* Orange 200 */
            color: #c2410c; /* Orange 700 */
            padding: 0.4rem 0.8rem;
            border-radius: 0 0 1px 1px;
            font-size: 0.75rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            white-space: pre-wrap;
            min-height: 1.5rem;
            box-sizing: border-box;
        }

        #command-lens-badge, #event-lens-badge {
            position: relative;
            bottom: auto;
            right: auto;
            display: block;
            width: fit-content;
            margin: 0 0.5rem 0.5rem auto;
            text-align: right;
        }
    </style>
</head>
<body id="slice-body">
    <div id="slice-container" class="slice-outer-container">
        <span id="slice-system-tag" class="slice-tag">LaundryLog</span>
        <span id="slice-label" class="slice-type">Command Slice</span>
        <div id="slice-header-container" class="slice-header-group">
            <header id="slice-header-section" class="slice-header">
                <h1 id="slice-main-title" class="slice-title">myCommand</h1>
            </header>
            <div id="slice-description-label" class="slice-header-description">description</div>
        </div>
        <div id="actor-row-box" class="slice-inset-box">
            <span id="actor-screen-label" class="inset-box-label">Text Screen Name</span>
            <div id="actor-badges-top-right" class="inset-box-badge-group">
                <span id="actor-type-badge" class="inset-box-badge-pill">TruckDriver</span>
                <span id="actor-screen-badge" class="inset-box-badge-type">SCREEN</span>
            </div>
            <span id="actor-lens-badge" class="inset-box-badge-code">business.emd</span>
            <img id="actor-screen-image" src="images/Screen.png" alt="Screen Snapshot" class="actor-screen-image">
        </div>
        <div id="command-row-box" class="slice-inset-box">
            <div id="command-badges-top-right" class="inset-box-badge-group">
                <span id="command-type-badge" class="inset-box-badge-type">COMMAND</span>
            </div>
            <div id="command-intent-rect" class="inset-box-blue-rect">LogExpense</div>
            <div id="command-properties-box" class="inset-box-toml-rect">amount = 42.50
category = "Fuel"</div>
            <span id="command-lens-badge" class="inset-box-badge-code">business.emd</span>
        </div>
        <div id="event-row-box" class="slice-inset-box">
            <div id="event-badges-top-right" class="inset-box-badge-group">
                <span id="event-type-badge" class="inset-box-badge-type">EVENT</span>
            </div>
            <div id="event-intent-rect" class="inset-box-orange-rect">ExpenseLogged</div>
            <div id="event-properties-box" class="inset-box-toml-rect-orange">amount = 42.50
category = "Fuel"
timestamp = 2026-03-15T23:24:00Z</div>
            <span id="event-lens-badge" class="inset-box-badge-code">business.emd</span>
        </div>
    </div>
</body>
</html>
