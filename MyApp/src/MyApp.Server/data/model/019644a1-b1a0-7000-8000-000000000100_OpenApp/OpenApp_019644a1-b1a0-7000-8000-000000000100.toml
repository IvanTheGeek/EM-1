# LaundryLog - Open App Command Slice

[slice]
id = "019644a1-b1a0-7000-8000-000000000100"
type = "CommandSlice"
name = "OpenApp"
system = "LaundryLog"
description = "Truck driver opens the LaundryLog app"

[[origins]]
id = "019644a1-b1a0-7000-8000-000000000110"
name = "Splash Screen"
swimlane = "TruckDriver"
snapshot = "app-splash-screen.png"
facets = ["business.emd"]

[command]
id = "019644a1-b1a0-7000-8000-000000000120"
name = "OpenApp"
facets = ["business.emd"]
fields = []

[handler]
id = "019644a1-b1a0-7000-8000-000000000130"
name = "OpenAppHandler"
facets = ["business"]

[[event]]
id = "019644a1-b1a0-7000-8000-000000000140"
name = "AppOpened"
facets = ["business.emd"]
fields = [
    { name = "openedAt", type = "datetime" },
]

# GWT rules: all must pass. Each is a validation gate for its facet concern.
# Failure of any rule = error. Facets control visibility by concern.

[[handler.gwt]]
id = "019644a1-b1a0-7000-8000-000000000150"
name = "OpenApp"
given = "Unit"
when = "OpenApp"
then = "AppOpened"
facets = ["business.emd"]
description = "No prior state needed. App opened."